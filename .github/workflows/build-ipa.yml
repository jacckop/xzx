name: Build Unsigned IPA
on:
  workflow_dispatch:
  push:
    branches: [main, master]
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        run: |
          xcodebuild -project CinemanaPro.xcodeproj -scheme CinemanaPro -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          test -n "$APP_PATH"
          cp -R "$APP_PATH" Payload/CinemanaPro.app
          zip -qry CinemanaPro-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: CinemanaPro-unsigned
          path: CinemanaPro-unsigned.ipa
      - name: Publish release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Cinemana Pro Build ${{ github.run_number }}
          files: CinemanaPro-unsigned.ipa
