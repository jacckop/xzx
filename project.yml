name: CinemanaPro
options:
  bundleIdPrefix: com.kiraplus
  deploymentTarget:
    iOS: '17.4'
settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ''
targets:
  CinemanaPro:
    type: application
    platform: iOS
    sources: [CinemanaPro]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiraplus.cinemanapro
        PRODUCT_NAME: Cinemana Pro
        INFOPLIST_FILE: CinemanaPro/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: '1,2'
    scheme:
      testTargets: []
